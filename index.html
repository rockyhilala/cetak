<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Kiosk - Upload</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 40px 20px;
      }

      .container {
        max-width: 680px;
        margin: 0 auto;
      }

      /* Header */
      .header {
        text-align: center;
        margin-bottom: 30px;
      }

      .header-icon {
        background: rgba(255,255,255,0.2);
        width: 80px;
        height: 80px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        backdrop-filter: blur(10px);
        animation: float 3s ease-in-out infinite;
      }

      .header-icon i {
        font-size: 40px;
        color: white;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }

      h1 {
        color: white;
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 8px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
      }

      .subtitle {
        color: rgba(255,255,255,0.9);
        font-size: 16px;
      }

      /* Card */
      .card {
        background: white;
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        margin-bottom: 20px;
      }

      /* Form Groups */
      .form-group {
        margin-bottom: 24px;
      }

      label {
        display: block;
        font-weight: 600;
        color: #333;
        margin-bottom: 8px;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      label i {
        margin-right: 8px;
        color: #667eea;
      }

      input, select {
        width: 100%;
        padding: 14px 16px;
        font-size: 16px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-family: 'Inter', sans-serif;
        transition: all 0.3s ease;
        background: #fafafa;
      }

      input:focus, select:focus {
        outline: none;
        border-color: #667eea;
        background: white;
        box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
      }

      input[readonly] {
        background: #e8f5e9;
        border-color: #4caf50;
        color: #2e7d32;
        font-weight: 500;
      }

      .note {
        display: block;
        font-size: 12px;
        color: #999;
        margin-top: 6px;
      }

      .note i {
        margin-right: 4px;
        font-size: 10px;
      }

      /* File Upload */
      .file-upload-area {
        border: 2px dashed #ccc;
        border-radius: 12px;
        padding: 30px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        background: #fafafa;
      }

      .file-upload-area:hover {
        border-color: #667eea;
        background: #f5f3ff;
      }

      .file-upload-area i {
        font-size: 48px;
        color: #667eea;
        margin-bottom: 12px;
      }

      .file-upload-area p {
        color: #666;
        font-size: 14px;
      }

      .file-upload-area .file-name {
        margin-top: 10px;
        color: #667eea;
        font-weight: 500;
        word-break: break-all;
      }

      #fileUpload {
        display: none;
      }

      /* Harga Estimasi */
      .harga-card {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 16px;
        padding: 20px;
        margin: 24px 0;
        text-align: center;
      }

      .harga-label {
        color: rgba(255,255,255,0.9);
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 8px;
      }

      #hargaEstimasi {
        font-size: 42px;
        font-weight: 800;
        color: white;
        margin: 0;
        line-height: 1;
      }

      /* Tombol */
      .btn-submit {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102,126,234,0.3);
      }

      .btn-submit:active {
        transform: translateY(0);
      }

      /* Loading */
      .loading {
        text-align: center;
        padding: 40px;
        background: white;
        border-radius: 24px;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #e0e0e0;
        border-top-color: #667eea;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .hidden {
        display: none;
      }

      /* Info hint */
      .info-hint {
        background: #e3f2fd;
        border-left: 4px solid #2196f3;
        padding: 12px;
        border-radius: 8px;
        margin-top: 8px;
        font-size: 13px;
        color: #1565c0;
      }

      .info-hint i {
        margin-right: 8px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="header-icon">
          <i class="fas fa-print"></i>
        </div>
        <h1>Print Kiosk</h1>
        <p class="subtitle">Upload dokumen Anda dengan mudah</p>
      </div>

      <div class="card">
        <form id="uploadForm">
          <!-- Nama Pendek -->
          <div class="form-group">
            <label><i class="fas fa-user"></i> Nama Panggilan</label>
            <input type="text" name="namaPendek" required maxlength="20" placeholder="Contoh: Budi">
            <span class="note"><i class="fas fa-info-circle"></i> Maksimal 20 karakter</span>
          </div>
          
          <!-- Jenis Konten -->
          <div class="form-group">
            <label><i class="fas fa-file-alt"></i> Jenis Konten</label>
            <select name="jenisKonten" id="jenisKonten" required>
              <option value="">-- Pilih Jenis --</option>
              <option value="Teks">📄 Teks</option>
              <option value="Gambar">🖼️ Gambar</option>
              <option value="Campuran">🎨 Campuran (Teks + Gambar)</option>
            </select>
          </div>
          
          <!-- Input Total Halaman -->
          <div class="form-group">
            <label><i class="fas fa-copy"></i> Total Halaman / Lembar</label>
            <input type="number" name="totalHalaman" id="totalHalaman" min="1" value="1" required>
            <span class="note"><i class="fas fa-magic"></i> Akan terisi otomatis jika file PDF</span>
          </div>
          
          <!-- Input Jumlah Halaman Bergambar -->
          <div class="form-group hidden" id="divJmlGambar">
            <label><i class="fas fa-image"></i> Jumlah Halaman Bergambar</label>
            <input type="number" name="jmlHalamanBergambar" id="jmlHalamanBergambar" min="0" value="0">
            <span class="note"><i class="fas fa-exclamation-triangle"></i> Harus ≤ Total Halaman</span>
          </div>
          
          <!-- Upload File -->
          <div class="form-group">
            <label><i class="fas fa-cloud-upload-alt"></i> Upload Berkas</label>
            <div class="file-upload-area" id="fileUploadArea">
              <i class="fas fa-cloud-upload-alt"></i>
              <p>Klik atau drag & drop file di sini</p>
              <p class="note" style="margin-top: 5px;">PDF, DOC, JPG, PNG (Max 10MB)</p>
              <div id="fileNameDisplay" class="file-name"></div>
            </div>
            <input type="file" name="fileUpload" id="fileUpload" accept=".pdf,.doc,.docx,image/jpeg,image/png" required>
            <div id="pageHint" class="info-hint hidden"></div>
          </div>
          
          <!-- Estimasi Harga -->
          <div class="harga-card">
            <div class="harga-label">Estimasi Harga</div>
            <div id="hargaEstimasi">Rp 0</div>
          </div>
          
          <!-- Tombol Kirim -->
          <button type="submit" class="btn-submit" id="submitBtn">
            <i class="fas fa-qrcode"></i>
            Proses & Dapatkan QR
          </button>
        </form>
      </div>
    </div>
    
    <!-- Tempat loading -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>⏳ Memproses data Anda...</p>
      <p style="font-size: 12px; color: #999; margin-top: 8px;">Mohon tunggu sebentar</p>
    </div>
    
   <script>
  // File upload area handler
  const fileUploadArea = document.getElementById('fileUploadArea');
  const fileInput = document.getElementById('fileUpload');
  const fileNameDisplay = document.getElementById('fileNameDisplay');

  fileUploadArea.addEventListener('click', () => {
    fileInput.click();
  });

  fileInput.addEventListener('change', (e) => {
    if (e.target.files.length > 0) {
      fileNameDisplay.innerHTML = `<i class="fas fa-check-circle"></i> ${e.target.files[0].name}`;
      fileUploadArea.style.borderColor = '#4caf50';
    } else {
      fileNameDisplay.innerHTML = '';
      fileUploadArea.style.borderColor = '#ccc';
    }
    // Trigger page detection
    const changeEvent = new Event('change');
    fileInput.dispatchEvent(changeEvent);
  });

  // ==== LOGIKA PERHITUNGAN HARGA =====
  function hitungHarga(jenisKonten, totalHalaman, jmlGambar) {
    let hargaPerLembarTeks = 0;
    let hargaPerLembarGambar = 0;
    
    // Tentukan harga per lembar berdasarkan total halaman (tier)
    if (totalHalaman <= 10) {
      hargaPerLembarTeks = 2000;
      hargaPerLembarGambar = 2500;
    } else if (totalHalaman <= 50) {
      hargaPerLembarTeks = 1500;
      hargaPerLembarGambar = 2000;
    } else {
      hargaPerLembarTeks = 1000;
      hargaPerLembarGambar = 1500;
    }
    
    let totalHarga = 0;
    if (jenisKonten === 'Teks') {
      totalHarga = totalHalaman * hargaPerLembarTeks;
    } else if (jenisKonten === 'Gambar') {
      totalHarga = totalHalaman * hargaPerLembarGambar;
    } else if (jenisKonten === 'Campuran') {
      const halamanTeks = totalHalaman - jmlGambar;
      totalHarga = (halamanTeks * hargaPerLembarTeks) + (jmlGambar * hargaPerLembarGambar);
    }
    return totalHarga;
  }
  
  function updateHarga() {
    const jenis = document.getElementById('jenisKonten').value;
    let total = parseInt(document.getElementById('totalHalaman').value) || 1;
    let jmlGambar = 0;
    
    // Validasi total halaman minimal 1
    if (total < 1) {
      total = 1;
      document.getElementById('totalHalaman').value = 1;
    }
    
    if (jenis === 'Campuran') {
      jmlGambar = parseInt(document.getElementById('jmlHalamanBergambar').value) || 0;
      if (jmlGambar > total) {
        document.getElementById('jmlHalamanBergambar').value = total;
        jmlGambar = total;
      }
    }
    
    const harga = hitungHarga(jenis, total, jmlGambar);
    document.getElementById('hargaEstimasi').innerHTML = 'Rp ' + harga.toLocaleString('id-ID');
    return harga;
  }
  
  // Event listeners untuk update harga
  document.getElementById('jenisKonten').addEventListener('change', function() {
    const div = document.getElementById('divJmlGambar');
    if (this.value === 'Campuran') {
      div.classList.remove('hidden');
    } else {
      div.classList.add('hidden');
    }
    updateHarga(); // <-- Pastikan update harga dipanggil
  });
  
  document.getElementById('totalHalaman').addEventListener('input', function() {
    let value = parseInt(this.value) || 1;
    if (value < 1) {
      this.value = 1;
      value = 1;
    }
    updateHarga(); // <-- Update harga setiap kali total halaman berubah
  });
  
  document.getElementById('jmlHalamanBergambar').addEventListener('input', function() {
    const total = parseInt(document.getElementById('totalHalaman').value) || 1;
    let value = parseInt(this.value) || 0;
    if (value > total) {
      this.value = total;
      value = total;
    }
    if (value < 0) {
      this.value = 0;
    }
    updateHarga(); // <-- Update harga setiap kali jumlah gambar berubah
  });
  
  // Deteksi halaman PDF (tetap sama)
  document.getElementById('fileUpload').addEventListener('change', async function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const totalInput = document.getElementById('totalHalaman');
    const hint = document.getElementById('pageHint');

    hint.classList.add('hidden');
    hint.innerHTML = '';
    totalInput.readOnly = false;
    totalInput.style.backgroundColor = '';

    if (file.type === 'application/pdf') {
      try {
        const reader = new FileReader();

        reader.onload = async function(ev) {
          const typedarray = new Uint8Array(ev.target.result);
          const pdf = await pdfjsLib.getDocument({ data: typedarray }).promise;
          const pages = pdf.numPages;

          totalInput.value = pages;
          totalInput.readOnly = true;
          totalInput.style.backgroundColor = '#e8f5e9';

          hint.innerHTML = '<i class="fas fa-check-circle"></i> ✅ PDF terdeteksi: ' + pages + ' halaman (otomatis)';
          hint.classList.remove('hidden');
          
          updateHarga(); // <-- Update harga setelah deteksi PDF
        };

        reader.readAsArrayBuffer(file);

      } catch (err) {
        console.error(err);
        hint.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ❌ Gagal membaca PDF. Isi manual.';
        hint.classList.remove('hidden');
        updateHarga(); // <-- Tetap update harga
      }

    } 
    else if (file.type.startsWith('image/')) {
      totalInput.value = 1;
      totalInput.readOnly = true;
      totalInput.style.backgroundColor = '#e3f2fd';
      hint.innerHTML = '<i class="fas fa-image"></i> 🖼️ Gambar dihitung sebagai 1 halaman';
      hint.classList.remove('hidden');
      updateHarga(); // <-- Update harga setelah deteksi gambar
    } 
    else {
      totalInput.value = 1;
      totalInput.readOnly = false;
      hint.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ⚠️ Format tidak didukung auto hitung. Isi manual.';
      hint.classList.remove('hidden');
      updateHarga(); // <-- Update harga
    }
  });
  
  // Submit form
  document.getElementById('uploadForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const jenis = document.getElementById('jenisKonten').value;
    const total = parseInt(document.getElementById('totalHalaman').value);
    const jmlGambar = parseInt(document.getElementById('jmlHalamanBergambar').value) || 0;
    
    if (!jenis) {
      alert('Pilih jenis konten terlebih dahulu.');
      return;
    }
    
    if (jenis === 'Campuran' && jmlGambar > total) {
      alert('Jumlah halaman bergambar tidak boleh lebih dari total halaman.');
      return;
    }
    
    const fileInput = document.getElementById('fileUpload');
    if (fileInput.files.length === 0) {
      alert('Pilih file untuk diupload.');
      return;
    }
    
    const file = fileInput.files[0];
    const reader = new FileReader();
    reader.onload = function(ev) {
      const base64Data = ev.target.result.split(',')[1];
      
      const formData = {
        namaPendek: document.querySelector('[name="namaPendek"]').value,
        jenisKonten: jenis,
        totalHalaman: total,
        jmlHalamanBergambar: jmlGambar,
        estimasiHarga: updateHarga() // <-- Ambil harga terbaru
      };
      
      document.getElementById('loading').classList.remove('hidden');
      document.querySelector('.card').style.opacity = '0.5';
      
      google.script.run
        .withSuccessHandler(function(result) {
          document.getElementById('loading').classList.add('hidden');
          document.querySelector('.card').style.opacity = '1';
          if (result.success) {
            const successUrl = 'https://script.google.com/macros/s/AKfycbyV-jHg7SxnntO1m2WLVmtBhhtSdSMNt8DuiLY-927DK161lC3LIxpMU5MGtm5uhRcK/exec?page=success&id=' + result.transactionId;
            window.top.location.href = successUrl;
          } else {
            alert('Gagal: ' + result.error);
          }
        })
        .withFailureHandler(function(err) {
          document.getElementById('loading').classList.add('hidden');
          document.querySelector('.card').style.opacity = '1';
          alert('Error: ' + err.message);
        })
        .processUpload(formData, {
          data: base64Data,
          name: file.name,
          type: file.type
        });
    };
    reader.readAsDataURL(file);
  });
  
  // Inisialisasi harga saat halaman dimuat
  updateHarga(); // <-- Pastikan harga ditampilkan saat pertama kali load
</script>
  </body>
</html>
